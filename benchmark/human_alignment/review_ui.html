<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeepTutor Pairwise Review</title>
    <style>
      :root {
        --ink: #1d2733;
        --muted: #667085;
        --line: #d5dbe4;
        --page: #f5f7fa;
        --panel: #fff;
        --accent: #0f766e;
        --accent-soft: #d9f3ee;
        --a: #eef4ff;
        --b: #eef8f0;
        --source: #fff7dc;
        --danger: #b42318;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--page);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.45;
      }
      button, input, textarea { font: inherit; }
      button { cursor: pointer; }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 5;
        background: rgba(255,255,255,.96);
        border-bottom: 1px solid var(--line);
      }
      .topbar-inner {
        max-width: 1500px;
        margin: 0 auto;
        padding: 12px 20px;
        display: grid;
        grid-template-columns: minmax(220px, 1fr) auto;
        gap: 14px;
        align-items: center;
      }
      h1 { margin: 0; font-size: 20px; letter-spacing: 0; }
      .toolbar { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 10px; align-items: end; }
      .field { display: grid; gap: 4px; }
      .field label { color: var(--muted); font-size: 12px; font-weight: 700; }
      input, textarea {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        padding: 7px 10px;
      }
      textarea { width: 100%; min-height: 88px; resize: vertical; }
      .btn {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        padding: 7px 12px;
        font-weight: 700;
      }
      .btn.primary { border-color: var(--accent); background: var(--accent); color: #fff; }
      .btn:disabled { opacity: .55; cursor: not-allowed; }
      .layout {
        max-width: 1500px;
        margin: 0 auto;
        padding: 18px 20px 24px;
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr) 390px;
        gap: 16px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        min-width: 0;
        max-width: 100%;
      }
      .side {
        position: sticky;
        top: 76px;
        align-self: start;
        max-height: calc(100vh - 96px);
        overflow: auto;
      }
      .head {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
      }
      .head h2 { margin: 0; font-size: 15px; }
      .body { padding: 14px; }
      .status { color: var(--muted); font-size: 13px; }
      .progress { height: 8px; background: #e8edf2; border-radius: 99px; overflow: hidden; }
      .progress span { display: block; height: 100%; width: 0%; background: var(--accent); }
      .nav { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
      .list { display: grid; gap: 6px; margin-top: 12px; }
      .item {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        padding: 8px 9px;
        text-align: left;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }
      .item.active { border-color: var(--accent); background: var(--accent-soft); }
      .badge {
        border-radius: 99px;
        padding: 2px 8px;
        min-height: 22px;
        background: #e9edf2;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }
      .badge.done { background: var(--accent-soft); color: var(--accent); }
      .main { display: grid; gap: 16px; min-width: 0; }
      .meta {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      dl { margin: 0; display: grid; gap: 8px; }
      dt { color: var(--muted); font-size: 12px; font-weight: 800; }
      dd { margin: 2px 0 0; overflow-wrap: anywhere; }
      .chips { display: flex; flex-wrap: wrap; gap: 6px; }
      .chip { border-radius: 99px; padding: 3px 8px; background: #eef1f4; font-size: 12px; }
      .gap, .question, .msg {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        background: #fff;
        min-width: 0;
        max-width: 100%;
        overflow: hidden;
      }
      .gap-title, .msg-head {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 6px;
      }
      .source {
        margin-top: 8px;
        border-left: 3px solid #d89b20;
        background: var(--source);
        padding: 8px 10px;
        overflow-wrap: anywhere;
        font-size: 13px;
      }
      .compare {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        min-width: 0;
      }
      .compare > .panel {
        min-width: 0;
        overflow: hidden;
      }
      .system-a .head { background: var(--a); }
      .system-b .head { background: var(--b); }
      .stack { display: grid; gap: 10px; }
      .markdown {
        max-width: 100%;
        min-width: 0;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .markdown * {
        max-width: 100%;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .markdown > :first-child { margin-top: 0; }
      .markdown > :last-child { margin-bottom: 0; }
      .markdown p { margin: 0 0 10px; }
      .markdown h1, .markdown h2, .markdown h3 {
        margin: 12px 0 8px;
        line-height: 1.25;
        letter-spacing: 0;
      }
      .markdown h1 { font-size: 22px; }
      .markdown h2 { font-size: 19px; }
      .markdown h3 { font-size: 16px; }
      .markdown ul, .markdown ol { margin: 0 0 10px 22px; padding: 0; }
      .markdown li { margin: 3px 0; }
      .markdown .math-inline {
        font-family: "Times New Roman", Times, serif;
        font-style: italic;
        white-space: nowrap;
      }
      .markdown .math-inline sup,
      .markdown .math-inline sub {
        font-size: .72em;
        line-height: 0;
      }
      .markdown table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
        margin: 10px 0;
        font-size: 13px;
      }
      .markdown th,
      .markdown td {
        border: 1px solid var(--line);
        padding: 6px 8px;
        text-align: left;
        vertical-align: top;
      }
      .markdown th {
        background: #f8fafc;
        font-weight: 800;
      }
      .markdown code {
        border: 1px solid #d9dee7;
        border-radius: 4px;
        background: #f6f8fa;
        padding: 1px 4px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: .92em;
      }
      .markdown pre {
        overflow: auto;
        border: 1px solid #d9dee7;
        border-radius: 6px;
        background: #f6f8fa;
        padding: 10px;
      }
      .markdown pre code {
        border: 0;
        padding: 0;
        background: transparent;
      }
      .markdown blockquote {
        margin: 0 0 10px;
        padding: 6px 10px;
        border-left: 3px solid #aab4c2;
        color: #475467;
        background: #f7f9fb;
      }
      .markdown hr {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 12px 0;
      }
      .score-form { display: grid; gap: 14px; }
      .metric-group { display: grid; gap: 8px; }
      .metric-group h3 { margin: 0; font-size: 14px; }
      .metric {
        display: grid;
        gap: 7px;
        border-top: 1px solid #edf0f4;
        padding-top: 10px;
      }
      .metric-name { font-weight: 800; }
      .metric-help { color: var(--muted); font-size: 12px; }
      .choice {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 6px;
      }
      .choice button {
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        font-weight: 800;
      }
      .choice button.active { border-color: var(--accent); background: var(--accent); color: #fff; }
      .empty {
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 24px;
        color: var(--muted);
        background: #fff;
      }
      .error { color: var(--danger); }
      @media (max-width: 1180px) {
        .layout { grid-template-columns: 230px minmax(0,1fr); }
        .scores { grid-column: 1 / -1; position: static; max-height: none; }
      }
      @media (max-width: 850px) {
        .topbar-inner, .layout, .compare, .meta { grid-template-columns: 1fr; }
        .toolbar { justify-content: stretch; }
        .toolbar > * { width: 100%; }
        .side { position: static; max-height: none; }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <h1>DeepTutor Pairwise Human Review</h1>
        <div class="toolbar">
          <div class="field"><label for="raterId">Rater ID</label><input id="raterId" type="text" placeholder="rater_01" /></div>
          <div class="field"><label for="packageFile">Annotation package</label><input id="packageFile" type="file" accept=".jsonl,.json" /></div>
          <div class="field"><label for="resumeFile">Resume CSV</label><input id="resumeFile" type="file" accept=".csv" /></div>
          <button id="exportCsv" class="btn primary" disabled>Export CSV</button>
        </div>
      </div>
    </header>
    <main class="layout">
      <aside class="panel side">
        <div class="head"><h2>Pairs</h2><span id="countLabel" class="status">0/0</span></div>
        <div class="body">
          <div class="progress"><span id="progressBar"></span></div>
          <p id="loadState" class="status">Load annotation_package.jsonl.</p>
          <div class="nav"><button id="prevItem" class="btn" disabled>Prev</button><button id="nextItem" class="btn" disabled>Next</button></div>
          <div id="itemList" class="list"></div>
        </div>
      </aside>
      <section id="content" class="main">
        <div class="empty">Load a pairwise annotation package to begin.</div>
      </section>
      <aside class="panel side scores">
        <div class="head"><h2>Preferences</h2><span id="scoreState" class="status">Not loaded</span></div>
        <div class="body"><div id="scoreForm" class="score-form"></div></div>
      </aside>
    </main>
    <script>
      const metrics = [
        ["SF", "Source faithfulness", "Which tutor is more faithful to the source excerpts?"],
        ["PER", "Personalization", "Which tutor adapts better to the student profile and confusion?"],
        ["APP", "Applicability", "Which tutor better helps the student complete the task?"],
        ["VID", "Vividness", "Which tutor gives more concrete and example-rich explanations?"],
        ["LD", "Logical depth", "Which tutor gives deeper and more coherent reasoning?"],
        ["FIT", "PQ fitness", "Which practice set better fits the student and gaps?"],
        ["GND", "PQ groundedness", "Which practice set is more source-grounded?"],
        ["DIV", "PQ diversity", "Which practice set covers more varied angles?"],
        ["ANS", "PQ answer quality", "Which practice set has better options and answers?"],
        ["CC", "PQ cross-concept", "Which practice set better connects related concepts?"],
      ];
      const transcriptMetrics = new Set(["SF", "PER", "APP", "VID", "LD"]);
      const columns = ["pair_id", "rater_id", ...metrics.map((m) => m[0]), "comment"];
      const state = { items: [], current: 0, answers: {}, storageKey: "" };
      const els = {
        raterId: document.getElementById("raterId"),
        packageFile: document.getElementById("packageFile"),
        resumeFile: document.getElementById("resumeFile"),
        exportCsv: document.getElementById("exportCsv"),
        content: document.getElementById("content"),
        scoreForm: document.getElementById("scoreForm"),
        itemList: document.getElementById("itemList"),
        countLabel: document.getElementById("countLabel"),
        progressBar: document.getElementById("progressBar"),
        loadState: document.getElementById("loadState"),
        scoreState: document.getElementById("scoreState"),
        prevItem: document.getElementById("prevItem"),
        nextItem: document.getElementById("nextItem"),
      };
      els.packageFile.addEventListener("change", loadPackage);
      els.resumeFile.addEventListener("change", loadResumeCsv);
      els.exportCsv.addEventListener("click", exportCsv);
      els.prevItem.addEventListener("click", () => selectItem(state.current - 1));
      els.nextItem.addEventListener("click", () => selectItem(state.current + 1));
      els.raterId.addEventListener("input", () => { saveCurrent(); persist(); renderSidebar(); });

      function escapeHtml(value) {
        return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;");
      }
      function renderInlineMath(expr) {
        const symbols = {
          "\\rightarrow": "&#8594;",
          "\\to": "&#8594;",
          "\\leftarrow": "&#8592;",
          "\\Rightarrow": "&#8658;",
          "\\Leftarrow": "&#8656;",
          "\\leftrightarrow": "&#8596;",
          "\\Leftrightarrow": "&#8660;",
          "\\leq": "&#8804;",
          "\\le": "&#8804;",
          "\\geq": "&#8805;",
          "\\ge": "&#8805;",
          "\\neq": "&#8800;",
          "\\ne": "&#8800;",
          "\\approx": "&#8776;",
          "\\times": "&#215;",
          "\\cdot": "&#183;",
          "\\pm": "&#177;",
          "\\infty": "&#8734;",
          "\\sum": "&#8721;",
          "\\prod": "&#8719;",
          "\\alpha": "&#945;",
          "\\beta": "&#946;",
          "\\gamma": "&#947;",
          "\\delta": "&#948;",
          "\\epsilon": "&#949;",
          "\\theta": "&#952;",
          "\\lambda": "&#955;",
          "\\mu": "&#956;",
          "\\pi": "&#960;",
          "\\sigma": "&#963;",
          "\\phi": "&#966;",
          "\\omega": "&#969;",
        };
        let html = escapeHtml(expr).trim();
        html = html.replace(/\\text\{([^{}]+)\}/g, "$1");
        html = html.replace(/\\frac\{([^{}]+)\}\{([^{}]+)\}/g, "($1)/($2)");
        for (const [latex, entity] of Object.entries(symbols)) {
          html = html.replaceAll(escapeHtml(latex), entity);
        }
        html = html.replace(/\^\{([^{}]+)\}/g, "<sup>$1</sup>");
        html = html.replace(/_\{([^{}]+)\}/g, "<sub>$1</sub>");
        html = html.replace(/\^([A-Za-z0-9+\-=])/g, "<sup>$1</sup>");
        html = html.replace(/_([A-Za-z0-9+\-=])/g, "<sub>$1</sub>");
        html = html.replace(/\\([A-Za-z]+)/g, "$1");
        return `<span class="math-inline">${html}</span>`;
      }
      function renderInlineMarkdown(text) {
        const placeholders = [];
        function stash(html) {
          const token = `@@MDPLACEHOLDER${placeholders.length}@@`;
          placeholders.push(html);
          return token;
        }
        let source = String(text ?? "");
        source = source.replace(/`([^`]+)`/g, (_, code) => stash(`<code>${escapeHtml(code)}</code>`));
        source = source.replace(/\$([^$\n]+)\$/g, (_, expr) => stash(renderInlineMath(expr)));
        let html = escapeHtml(source);
        html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        html = html.replace(/__([^_]+)__/g, "<strong>$1</strong>");
        html = html.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, "<em>$1</em>");
        html = html.replace(/(?<!_)_([^_\n]+)_(?!_)/g, "<em>$1</em>");
        html = html.replace(/@@MDPLACEHOLDER(\d+)@@/g, (_, idx) => placeholders[Number(idx)] || "");
        return html;
      }
      function isTableRow(line) {
        const trimmed = line.trim();
        return trimmed.startsWith("|") && trimmed.includes("|", 1);
      }
      function isTableSeparator(line) {
        return /^\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?$/.test(line.trim());
      }
      function splitTableRow(line) {
        return line.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map((cell) => cell.trim());
      }
      function markdownToHtml(raw) {
        const text = String(raw ?? "").replace(/\r\n/g, "\n");
        const lines = text.split("\n");
        const out = [];
        let paragraph = [];
        let listType = "";
        let inCode = false;
        let codeLines = [];
        let tableRows = [];
        let tableHasSeparator = false;
        function flushParagraph() {
          if (paragraph.length) {
            out.push(`<p>${renderInlineMarkdown(paragraph.join(" "))}</p>`);
            paragraph = [];
          }
        }
        function flushTable() {
          if (!tableRows.length) return;
          if (!tableHasSeparator || tableRows.length < 2) {
            paragraph.push(...tableRows.map((row) => row.join(" | ")));
          } else {
            const [head, ...body] = tableRows;
            const headHtml = head.map((cell) => `<th>${renderInlineMarkdown(cell)}</th>`).join("");
            const bodyHtml = body.map((row) => `<tr>${row.map((cell) => `<td>${renderInlineMarkdown(cell)}</td>`).join("")}</tr>`).join("");
            out.push(`<table><thead><tr>${headHtml}</tr></thead><tbody>${bodyHtml}</tbody></table>`);
          }
          tableRows = [];
          tableHasSeparator = false;
        }
        function closeList() {
          if (listType) {
            out.push(`</${listType}>`);
            listType = "";
          }
        }
        function openList(type) {
          if (listType !== type) {
            closeList();
            out.push(`<${type}>`);
            listType = type;
          }
        }
        for (const line of lines) {
          const trimmed = line.trim();
          if (trimmed.startsWith("```")) {
            if (inCode) {
              out.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
              codeLines = [];
              inCode = false;
            } else {
              flushTable();
              flushParagraph();
              closeList();
              inCode = true;
            }
            continue;
          }
          if (inCode) {
            codeLines.push(line);
            continue;
          }
          if (!trimmed) {
            flushTable();
            flushParagraph();
            closeList();
            continue;
          }
          if (isTableRow(trimmed) || (tableRows.length && isTableSeparator(trimmed))) {
            flushParagraph();
            closeList();
            if (tableRows.length === 1 && isTableSeparator(trimmed)) {
              tableHasSeparator = true;
            } else if (!isTableSeparator(trimmed)) {
              tableRows.push(splitTableRow(trimmed));
            }
            continue;
          }
          flushTable();
          if (/^---+$/.test(trimmed) || /^\*\*\*+$/.test(trimmed)) {
            flushParagraph();
            closeList();
            out.push("<hr>");
            continue;
          }
          const heading = trimmed.match(/^(#{1,3})\s+(.+)$/);
          if (heading) {
            flushParagraph();
            closeList();
            out.push(`<h${heading[1].length}>${renderInlineMarkdown(heading[2])}</h${heading[1].length}>`);
            continue;
          }
          const unordered = trimmed.match(/^[-*]\s+(.+)$/);
          if (unordered) {
            flushParagraph();
            openList("ul");
            out.push(`<li>${renderInlineMarkdown(unordered[1])}</li>`);
            continue;
          }
          const ordered = trimmed.match(/^\d+\.\s+(.+)$/);
          if (ordered) {
            flushParagraph();
            openList("ol");
            out.push(`<li>${renderInlineMarkdown(ordered[1])}</li>`);
            continue;
          }
          const quote = trimmed.match(/^>\s?(.+)$/);
          if (quote) {
            flushParagraph();
            closeList();
            out.push(`<blockquote>${renderInlineMarkdown(quote[1])}</blockquote>`);
            continue;
          }
          closeList();
          paragraph.push(trimmed);
        }
        if (inCode) out.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
        flushTable();
        flushParagraph();
        closeList();
        return `<div class="markdown">${out.join("")}</div>`;
      }
      function asList(value) { return Array.isArray(value) ? value : value ? [value] : []; }
      function currentItem() { return state.items[state.current] || null; }
      function ensureAnswer(pairId) {
        if (!state.answers[pairId]) state.answers[pairId] = { pair_id: pairId, rater_id: els.raterId.value.trim(), comment: "" };
        return state.answers[pairId];
      }
      function normalizePref(value) {
        const v = String(value || "").trim().toLowerCase();
        if (v === "a") return "A";
        if (v === "b") return "B";
        if (v === "tie" || v === "equal" || v === "same") return "tie";
        return "";
      }
      function loadPackage(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const rows = String(reader.result || "").split(/\r?\n/).map((line) => line.trim()).filter(Boolean).map((line) => JSON.parse(line));
            if (!rows.length) throw new Error("No pair items found.");
            state.items = rows;
            state.current = 0;
            state.answers = {};
            state.storageKey = "deeptutor-pairwise-review:" + file.name + ":" + rows.length;
            loadPersisted();
            for (const item of rows) ensureAnswer(item.pair_id);
            els.exportCsv.disabled = false;
            els.prevItem.disabled = false;
            els.nextItem.disabled = false;
            els.loadState.textContent = file.name;
            selectItem(state.current || 0);
          } catch (err) {
            showError("Could not load package: " + err.message);
          }
        };
        reader.readAsText(file);
      }
      function saveCurrent() {
        const item = currentItem();
        if (!item) return;
        const answer = ensureAnswer(item.pair_id);
        answer.rater_id = els.raterId.value.trim();
        const comment = document.getElementById("comment");
        if (comment) answer.comment = comment.value;
      }
      function selectItem(index) {
        saveCurrent();
        if (!state.items.length) return;
        const previous = state.current;
        state.current = Math.max(0, Math.min(index, state.items.length - 1));
        render();
        if (state.current !== previous) scrollPairToTop();
        persist();
      }
      function render() { renderSidebar(); renderContent(); renderScoreForm(); }
      function scrollPairToTop() {
        window.scrollTo({ top: 0, left: 0, behavior: "auto" });
        els.content.scrollTop = 0;
        document.querySelectorAll(".side").forEach((panel) => { panel.scrollTop = 0; });
      }
      function renderSidebar() {
        const total = state.items.length;
        const done = state.items.filter((item) => isComplete(item.pair_id)).length;
        els.countLabel.textContent = done + "/" + total;
        els.progressBar.style.width = total ? `${(100 * done) / total}%` : "0%";
        els.prevItem.disabled = !total || state.current === 0;
        els.nextItem.disabled = !total || state.current >= total - 1;
        els.itemList.innerHTML = state.items.map((item, idx) => {
          const complete = isComplete(item.pair_id);
          const title = item.task && item.task.title ? item.task.title : item.pair_id;
          return `<button class="item ${idx === state.current ? "active" : ""}" data-index="${idx}">
            <span>${escapeHtml(item.pair_id)}<br><span class="status">${escapeHtml(title)}</span></span>
            <span class="badge ${complete ? "done" : ""}">${complete ? "OK" : idx + 1}</span>
          </button>`;
        }).join("");
        for (const button of els.itemList.querySelectorAll("button")) button.addEventListener("click", () => selectItem(Number(button.dataset.index)));
      }
      function renderContent() {
        const item = currentItem();
        if (!item) return;
        const profile = item.profile || {};
        const task = item.task || {};
        els.content.innerHTML = `
          <section class="panel"><div class="head"><h2>${escapeHtml(item.pair_id)}</h2><span class="status">${escapeHtml(item.rubric_version || "")}</span></div>
            <div class="body meta">
              <dl>
                <div><dt>Profile</dt><dd>${escapeHtml(profile.profile_id || "")}</dd></div>
                <div><dt>Background</dt><dd>${escapeHtml(profile.education_background || "")}</dd></div>
                <div><dt>Purpose</dt><dd>${escapeHtml(profile.learning_purpose || "")}</dd></div>
                <div><dt>Beliefs</dt><dd>${escapeHtml(profile.beliefs || "")}</dd></div>
              </dl>
              <dl>
                <div><dt>Task</dt><dd>${escapeHtml(task.title || "")}</dd></div>
                <div><dt>Description</dt><dd>${escapeHtml(task.description || "")}</dd></div>
                <div><dt>Success criteria</dt><dd>${escapeHtml(task.success_criteria || "")}</dd></div>
                <div><dt>Known / Partial / Unknown</dt><dd>${chips(asList(profile.known_well))}${chips(asList(profile.partially_known))}${chips(asList(profile.unknown))}</dd></div>
              </dl>
            </div>
          </section>
          <section class="panel"><div class="body"><h2>Gaps and Source</h2><div class="stack">${renderGaps(item.gaps || [])}</div></div></section>
          <section class="compare">
            ${renderSystem("A", item.system_a || {})}
            ${renderSystem("B", item.system_b || {})}
          </section>`;
      }
      function chips(values) {
        if (!values.length) return '<span class="status">None</span>';
        return `<div class="chips">${values.map((value) => `<span class="chip">${escapeHtml(value)}</span>`).join("")}</div>`;
      }
      function renderGaps(gaps) {
        if (!gaps.length) return '<div class="empty">No gaps provided.</div>';
        return gaps.map((gap) => {
          const sourceHtml = Object.entries(gap.source_excerpts || {}).map(([page, text]) => `<div class="source"><strong>Page ${escapeHtml(page)}</strong>${markdownToHtml(text)}</div>`).join("");
          return `<article class="gap"><div class="gap-title"><span>${escapeHtml(gap.gap_id || "")} ${escapeHtml(gap.target_concept || "")}</span><span>${escapeHtml(gap.gap_type || "")}</span></div>
            ${markdownToHtml(gap.description || "")}
            ${gap.correct_understanding ? `<p><strong>Correct understanding:</strong></p>${markdownToHtml(gap.correct_understanding)}` : ""}
            ${sourceHtml || '<p class="status">No source excerpt.</p>'}
          </article>`;
        }).join("");
      }
      function normalizeForOverlap(text) {
        return String(text || "").toLowerCase().replace(/[^a-z0-9]/g, "");
      }
      function looksLikePracticeQuestionTurn(message, questions) {
        if (!message || message.role !== "tutor" || !questions || !questions.length) return false;
        const content = normalizeForOverlap(message.content || "");
        if (!content) return false;
        let matched = 0;
        for (const question of questions) {
          const normalized = normalizeForOverlap(question);
          const snippet = normalized.slice(0, Math.min(normalized.length, 240));
          if (snippet && content.includes(snippet)) matched += 1;
        }
        return matched >= Math.max(1, Math.min(2, questions.length));
      }
      function dialogWithoutPracticeQuestionTurn(system) {
        const dialog = [...(system.dialog || [])];
        if (dialog.length && looksLikePracticeQuestionTurn(dialog[dialog.length - 1], system.practice_questions || [])) {
          dialog.pop();
        }
        return dialog;
      }
      function renderSystem(label, system) {
        const dialog = dialogWithoutPracticeQuestionTurn(system);
        return `<section class="panel system-${label.toLowerCase()}">
          <div class="head"><h2>System ${label}</h2><span class="status">${dialog.length} dialog messages</span></div>
          <div class="body stack">
            <h3>Dialog</h3>
            ${renderDialog(dialog)}
            <h3>Practice Questions</h3>
            ${renderQuestions(system.practice_questions || [])}
          </div>
        </section>`;
      }
      function renderDialog(dialog) {
        if (!dialog.length) return '<div class="empty">No dialog provided.</div>';
        return dialog.map((message, idx) => `<article class="msg"><div class="msg-head"><span>${idx + 1}. ${escapeHtml(message.role || "")}</span></div>${markdownToHtml(message.content || "")}</article>`).join("");
      }
      function renderQuestions(questions) {
        if (!questions.length) return '<div class="empty">No practice questions provided.</div>';
        return questions.map((question, idx) => `<article class="question"><div class="msg-head"><span>Question ${idx + 1}</span></div>${markdownToHtml(question)}</article>`).join("");
      }
      function renderScoreForm() {
        const item = currentItem();
        if (!item) return;
        const answer = ensureAnswer(item.pair_id);
        els.scoreState.textContent = isComplete(item.pair_id) ? "Complete" : "Incomplete";
        const groups = [
          ["Transcript metrics", metrics.filter(([code]) => transcriptMetrics.has(code))],
          ["Practice metrics", metrics.filter(([code]) => !transcriptMetrics.has(code))],
        ];
        els.scoreForm.innerHTML = groups.map(([title, groupMetrics]) => `<div class="metric-group"><h3>${title}</h3>${groupMetrics.map(([code, label, help]) => {
          const current = answer[code] || "";
          return `<div class="metric"><div><div class="metric-name">${code} · ${escapeHtml(label)}</div><div class="metric-help">${escapeHtml(help)}</div></div>
            <div class="choice" data-metric="${code}">
              ${["A", "tie", "B"].map((pref) => `<button type="button" class="${current === pref ? "active" : ""}" data-pref="${pref}">${pref === "tie" ? "Tie" : pref + " better"}</button>`).join("")}
            </div></div>`;
        }).join("")}</div>`).join("") + `<div class="field"><label for="comment">Comment</label><textarea id="comment">${escapeHtml(answer.comment || "")}</textarea></div>`;
        for (const group of els.scoreForm.querySelectorAll(".choice")) {
          group.addEventListener("click", (event) => {
            const button = event.target.closest("button");
            if (!button) return;
            ensureAnswer(item.pair_id)[group.dataset.metric] = button.dataset.pref;
            renderScoreForm(); renderSidebar(); persist();
          });
        }
        document.getElementById("comment").addEventListener("input", (event) => { ensureAnswer(item.pair_id).comment = event.target.value; persist(); });
      }
      function isComplete(pairId) {
        const answer = state.answers[pairId];
        return !!answer && metrics.every(([code]) => ["A", "B", "tie"].includes(answer[code]));
      }
      function persist() {
        if (!state.storageKey) return;
        localStorage.setItem(state.storageKey, JSON.stringify({ answers: state.answers, raterId: els.raterId.value.trim(), current: state.current }));
      }
      function loadPersisted() {
        const raw = localStorage.getItem(state.storageKey);
        if (!raw) return;
        try {
          const data = JSON.parse(raw);
          state.answers = data.answers || {};
          if (data.raterId && !els.raterId.value) els.raterId.value = data.raterId;
          state.current = Number(data.current || 0);
        } catch { state.answers = {}; }
      }
      function csvEscape(value) {
        const text = String(value ?? "");
        return /[",\n\r]/.test(text) ? `"${text.replaceAll('"', '""')}"` : text;
      }
      function exportCsv() {
        saveCurrent();
        const lines = [columns.join(",")];
        for (const item of state.items) {
          const answer = ensureAnswer(item.pair_id);
          answer.rater_id = answer.rater_id || els.raterId.value.trim();
          lines.push(columns.map((column) => csvEscape(answer[column] || "")).join(","));
        }
        const blob = new Blob([lines.join("\n") + "\n"], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "completed_annotations.csv";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }
      function loadResumeCsv(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            for (const row of parseCsv(String(reader.result || ""))) {
              if (!row.pair_id) continue;
              const merged = { ...ensureAnswer(row.pair_id), ...row };
              for (const [code] of metrics) merged[code] = normalizePref(merged[code]);
              state.answers[row.pair_id] = merged;
            }
            render(); persist();
          } catch (err) { showError("Could not load CSV: " + err.message); }
        };
        reader.readAsText(file);
      }
      function parseCsv(text) {
        const rows = [];
        let row = [], field = "", quoted = false;
        for (let i = 0; i < text.length; i++) {
          const ch = text[i], next = text[i + 1];
          if (quoted) {
            if (ch === '"' && next === '"') { field += '"'; i++; }
            else if (ch === '"') quoted = false;
            else field += ch;
          } else if (ch === '"') quoted = true;
          else if (ch === ",") { row.push(field); field = ""; }
          else if (ch === "\n") { row.push(field); rows.push(row); row = []; field = ""; }
          else if (ch !== "\r") field += ch;
        }
        if (field || row.length) { row.push(field); rows.push(row); }
        if (!rows.length) return [];
        const header = rows[0];
        return rows.slice(1).map((values) => {
          const obj = {};
          header.forEach((key, idx) => { obj[key] = values[idx] || ""; });
          return obj;
        });
      }
      function showError(message) { els.content.innerHTML = `<div class="empty error">${escapeHtml(message)}</div>`; }
    </script>
  </body>
</html>
